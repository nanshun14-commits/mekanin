<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Mekanin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1520;
  touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;position:fixed;top:0;left:0;}
#warn{display:none;position:fixed;inset:0;background:#b0a898;z-index:999;
  color:#555;font-size:14px;font-family:sans-serif;
  align-items:center;justify-content:center;text-align:center;line-height:3;}
@media(orientation:portrait){#warn{display:flex;}}
#online-ui{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(10,8,20,0.97);
  align-items:center;justify-content:center;flex-direction:column;
  font-family:sans-serif;color:#fff;gap:16px;
}
#online-ui.show{display:flex;}
#online-ui h2{font-size:20px;color:#c8b060;margin-bottom:8px;}
#online-ui input{
  font-size:22px;letter-spacing:4px;text-align:center;
  background:#1a1828;border:2px solid #555;color:#fff;
  padding:10px 20px;border-radius:8px;width:220px;text-transform:uppercase;
}
#online-ui button{font-size:15px;padding:12px 32px;border-radius:8px;border:none;cursor:pointer;font-weight:bold;}
.btn-create{background:#e8c000;color:#1a1520;}
.btn-join{background:#a060ff;color:#fff;}
.btn-back{background:#444;color:#fff;font-size:13px;padding:8px 20px;}
#room-display{font-size:32px;letter-spacing:6px;color:#e8c000;font-weight:bold;}
#online-status{font-size:14px;color:#aaa;text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="warn">端末を横向きにしてください<br>ROTATE DEVICE</div>
<div id="online-ui">
  <h2>オンライン対戦</h2>
  <div id="online-status">接続中...</div>
  <div id="online-content"></div>
  <button class="btn-back" id="btn-back">← もどる</button>
</div>
<script>
'use strict';
const cv=document.getElementById('c'), cx=cv.getContext('2d');
let SW=0,SH=0;
function resize(){SW=cv.width=window.innerWidth;SH=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const WW=3200,WH=1920,VS=0.42;
let camX=0,camY=0;
function updateCamera(){
  const vW=SW/VS,vH=SH/VS;
  camX=Math.max(0,Math.min(WW-vW,pl.x-vW/2));
  camY=Math.max(0,Math.min(WH-vH,pl.y-vH/2));
}
function toWorld(sx,sy){return{x:sx/VS+camX,y:sy/VS+camY};}
const G=0.26,PULL=1.3125,WIRE_D=0.997,FREE_D=0.991,MAX_SPD=40,WIRE_MAX=450;
let blds=[],platforms=[];
function genBuildings(){
  blds=[];platforms=[];
  const CFGS=[
    {cx:320,floors:[{y:WH-360,h:360},{y:WH-720,h:300},{y:WH-1020,h:240}],bw:700},
    {cx:960,floors:[{y:WH-400,h:400},{y:WH-860,h:400}],bw:680},
    {cx:1600,floors:[{y:WH-320,h:320},{y:WH-760,h:380},{y:WH-1120,h:300}],bw:700},
    {cx:2240,floors:[{y:WH-420,h:420},{y:WH-880,h:400}],bw:680},
    {cx:2880,floors:[{y:WH-360,h:360},{y:WH-780,h:340},{y:WH-1080,h:260}],bw:700},
  ];
  CFGS.forEach(cfg=>{
    const bx=cfg.cx-cfg.bw/2;
    cfg.floors.forEach(fl=>{
      blds.push({x:bx,y:fl.y,w:cfg.bw,h:fl.h});
      platforms.push({x:bx-12,y:fl.y,w:cfg.bw+24,h:10});
    });
  });
  platforms.push({x:-80,y:-1200,w:85,h:WH+1400,wall:true});
  platforms.push({x:WW-5,y:-1200,w:85,h:WH+1400,wall:true});
  platforms.push({x:0,y:-10,w:WW,h:12,wall:true});
}
function castRay(fx,fy,tapWx,tapWy){
  const dx=tapWx-fx,dy=tapWy-fy,tapDist=Math.sqrt(dx*dx+dy*dy)||1;
  const reach=Math.min(tapDist,WIRE_MAX),nx=dx/tapDist,ny=dy/tapDist;
  const targetX=fx+nx*reach,targetY=fy+ny*reach,SNAP_R=120;
  let best=null,bestD=Infinity;
  const rects=[];
  for(const b of blds)rects.push({x:b.x,y:b.y,w:b.w,h:b.h});
  for(const pf of platforms){if(pf.wall)continue;rects.push({x:pf.x,y:pf.y,w:pf.w,h:pf.h});}
  for(const r of rects){
    if(targetX>=r.x&&targetX<=r.x+r.w&&targetY>=r.y&&targetY<=r.y+r.h){best={x:targetX,y:targetY};bestD=0;break;}
    const clampedX=Math.max(r.x,Math.min(r.x+r.w,targetX)),clampedY=Math.max(r.y,Math.min(r.y+r.h,targetY));
    const d=Math.sqrt((clampedX-targetX)**2+(clampedY-targetY)**2);
    if(d<SNAP_R&&d<bestD){bestD=d;best={x:clampedX,y:clampedY};}
  }
  return{tipX:best?best.x:targetX,tipY:best?best.y:targetY,anchor:best};
}
const IMGS={};
function loadImg(key,src){const im=new Image();im.src=src;IMGS[key]=im;}
loadImg('char1','char1.png');loadImg('char2','char2.png');loadImg('char3','char3.png');
loadImg('weap1','weap1.png');loadImg('weap2','weap2.png');loadImg('weap3','weap3.png');
const CHAR_H=210;

// ══ キャラ定義 ══
const CHARS=[
  {id:'tsugumi',name:'ツグミ',weapName:'ランス',spriteKey:'char1',weapKey:'weap1',col:'#e8c000',ammo:3,maxAmmo:3,
    // 攻撃範囲: 横500px、縦80px帯、吹き飛び: 強い横方向
    atkRange:{w:500,h:80},blowVx:55,blowVy:-18,
    attack(dir){pl.vx=dir*45;pl.vy=0;pl._atkStartX=pl.x;pl._atkDist=500;pl._atkDir=dir;
      effects.push({type:'slash_h',x:pl.x,y:pl.y,fR:dir>0,life:14,max:14,col:'#e8c000',range:400});blip(420,.1,.12);}},
  {id:'onimaru',name:'オニマル',weapName:'紫電',spriteKey:'char2',weapKey:'weap2',col:'#a060ff',ammo:2,maxAmmo:2,
    // 攻撃範囲: 横520px、縦40px、吹き飛び: 超強い横
    atkRange:{w:520,h:40},blowVx:72,blowVy:-10,
    attack(dir){pl.vx=dir*72;pl.vy=0;pl._atkStartX=pl.x;pl._atkDist=500;pl._atkDir=dir;
      effects.push({type:'slash_line',x:pl.x,y:pl.y,fR:dir>0,life:10,max:10,col:'#a060ff',range:500});blip(200,.08,.16);}},
  {id:'kousuke',name:'コウスケ',weapName:'ダンスソード',spriteKey:'char3',weapKey:'weap3',col:'#40e8e0',ammo:3,maxAmmo:3,
    // 攻撃範囲: 横450px、縦160px、吹き飛び: 斜め上
    atkRange:{w:450,h:160},blowVx:35,blowVy:-40,
    attack(dir){pl.vx=dir*20;pl.vy=10;pl._atkStartX=pl.x;pl._atkStartY=pl.y;pl._atkDist=450;pl._atkDir=dir;pl._atkAngle=0;
      effects.push({type:'spin',x:pl.x,y:pl.y,fR:dir>0,life:18,max:18,col:'#40e8e0',range:160});blip(500,.1,.13);}},
];
let selChar=0;
let attackCD=0;

// ══ 攻撃判定（オンライン対戦用）══
function checkAttackHitOpponent(dir){
  if(!isOnline) return;
  const ch=CHARS[selChar];
  const dx=(op.x-pl.x)*dir;
  const dy=Math.abs(op.y-pl.y);
  if(dx>=0&&dx<=ch.atkRange.w&&dy<=ch.atkRange.h){
    // ヒット！吹き飛びをサーバーに送信
    const blowVx=dir*ch.blowVx;
    const blowVy=ch.blowVy;
    ws.send(JSON.stringify({type:'hit',vx:blowVx,vy:blowVy}));
    // エフェクト
    spawnParts(op.x,op.y,ch.col,20);
    addPop('HIT!',op.x,op.y-100);
    blip(880,.1,.2);
  }
}

function doAttack(dir){
  if(attackCD>0)return;
  const ch=CHARS[selChar];
  if(ch.ammo<=0){blip(150,.05,.05);return;}
  ch.ammo--;pl.vx=0;pl.vy=0;ch.attack(dir);attackCD=0;
  // オンライン攻撃判定
  checkAttackHitOpponent(dir);
  sendState();
}

// ══ ONLINE ══
let ws=null,myPlayerId=null,isOnline=false;
const op={x:WW*.9,y:WH*.4,vx:0,vy:0,wire:null,dead:false,charIdx:0};
const onlineUI=document.getElementById('online-ui');
const onlineStatus=document.getElementById('online-status');
const onlineContent=document.getElementById('online-content');
document.getElementById('btn-back').addEventListener('click',()=>{
  if(ws){ws.close();ws=null;}isOnline=false;onlineUI.classList.remove('show');phase='title';
});
const WS_URL='wss://mekanin.onrender.com';
function connectWS(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{onlineStatus.textContent='接続完了！';showLobby();};
  ws.onerror=()=>{onlineStatus.textContent='接続失敗。サーバーが起動しているか確認してください。';};
  ws.onmessage=(e)=>{handleMsg(JSON.parse(e.data));};
  ws.onclose=()=>{if(isOnline&&phase==='play'){isOnline=false;}};
}
function handleMsg(msg){
  if(msg.type==='created'){myPlayerId=msg.playerId;showWaiting(msg.roomId);}
  else if(msg.type==='joined'){myPlayerId=msg.playerId;}
  else if(msg.type==='start'){myPlayerId=msg.playerId;onlineUI.classList.remove('show');isOnline=true;startOnlinePlay();}
  else if(msg.type==='state'){
    const d=msg.data;
    op.x=d.x;op.y=d.y;op.vx=d.vx;op.vy=d.vy;op.dead=d.dead;op.charIdx=d.charIdx;op.wire=d.wire||null;
  }
  else if(msg.type==='hit'){
    // 自分が吹き飛ぶ！
    pl.vx=msg.vx;pl.vy=msg.vy;
    pl.wire=null; // ワイヤー切れる
    dFlash=12;
    blip(120,.15,.25);
    spawnParts(pl.x,pl.y,'#ff4444',20);
    addPop('やられた！',pl.x,pl.y-100);
  }
  else if(msg.type==='error'){onlineStatus.textContent='エラー: '+msg.message;}
  else if(msg.type==='opponent_left'){alert('相手が切断しました');isOnline=false;phase='title';}
}
function showLobby(){
  onlineContent.innerHTML=`
    <button class="btn-create" id="btn-create">ルームを作る</button>
    <div style="color:#888;font-size:13px;">または</div>
    <input id="room-input" placeholder="ルームIDを入力" maxlength="6"/>
    <button class="btn-join" id="btn-join">参加する</button>
  `;
  document.getElementById('btn-create').onclick=()=>{ws.send(JSON.stringify({type:'create'}));onlineStatus.textContent='ルーム作成中...';};
  document.getElementById('btn-join').onclick=()=>{
    const id=document.getElementById('room-input').value.toUpperCase().trim();
    if(!id){onlineStatus.textContent='ルームIDを入力してください';return;}
    ws.send(JSON.stringify({type:'join',roomId:id}));onlineStatus.textContent='参加中...';
  };
}
function showWaiting(roomId){
  onlineContent.innerHTML=`
    <div style="font-size:13px;color:#aaa;">ルームID（友達に教えてね）</div>
    <div id="room-display">${roomId}</div>
    <div style="font-size:13px;color:#aaa;">友達の参加を待っています...</div>
  `;
  onlineStatus.textContent='';
}
function sendState(){
  if(!ws||!isOnline)return;
  ws.send(JSON.stringify({type:'state',data:{x:pl.x,y:pl.y,vx:pl.vx,vy:pl.vy,dead:pl.dead,charIdx:selChar,
    wire:pl.wire?{phase:pl.wire.phase,ax:pl.wire.ax,ay:pl.wire.ay,tX:pl.wire.tX,tY:pl.wire.tY,prog:pl.wire.prog}:null}}));
}
function startOnlinePlay(){phase='charsel';score=0;combo=0;pl.deaths=0;}

// ══ PLAYER ══
const pl={x:WW*.1,y:WH*.4,vx:0,vy:0,wire:null,dead:false,deaths:0};
function resetPl(){
  const vpf=platforms.filter(p=>!p.wall&&p.w>60);
  const pf=vpf[(Math.random()*vpf.length)|0];
  pl.x=pf?pf.x+pf.w/2:WW*.15;pl.y=pf?pf.y-50:WH*.35;
  pl.vx=0;pl.vy=0;pl.wire=null;pl.dead=false;
  CHARS.forEach(c=>c.ammo=c.maxAmmo);
  if(isOnline){if(myPlayerId===0){pl.x=WW*0.15;op.x=WW*0.85;}else{pl.x=WW*0.85;op.x=WW*0.15;}}
}
function clamp(){const s=Math.sqrt(pl.vx*pl.vx+pl.vy*pl.vy);if(s>MAX_SPD){pl.vx=pl.vx/s*MAX_SPD;pl.vy=pl.vy/s*MAX_SPD;}}
function grapple(tapWx,tapWy){
  const ray=castRay(pl.x,pl.y,tapWx,tapWy);
  pl.wire={tX:ray.tipX,tY:ray.tipY,anchor:ray.anchor,phase:'flying',prog:0,len:0,ax:0,ay:0};sendState();
}
function hookOn(){
  const w=pl.wire;
  if(w.anchor){
    w.phase='hooked';w.ax=w.anchor.x;w.ay=w.anchor.y;
    const adx=w.ax-pl.x,ady=w.ay-pl.y,d=Math.sqrt(adx*adx+ady*ady)||1;
    w.len=Math.min(d,WIRE_MAX);const nx=adx/d,ny=ady/d,vn=pl.vx*nx+pl.vy*ny;
    if(vn<0){pl.vx-=vn*nx;pl.vy-=vn*ny;}
    CHARS.forEach(c=>{c._reloadTimer=30;});blip(180,.05,.07);
  }else{w.phase='miss';w.prog=0;}
}
function relWire(){pl.wire=null;sendState();}

let syncTimer=0;
function tickPhys(){
  if(pl._atkStartX!==undefined){
    const ch=CHARS[selChar],col=ch.col;
    const movedX=Math.abs(pl.x-pl._atkStartX),movedY=pl._atkStartY!==undefined?Math.abs(pl.y-pl._atkStartY):0;
    const moved=ch.id==='kousuke'?(movedX+movedY):movedX;
    // ソロモード用ターゲット判定
    for(const t of targets){
      if(t.hit)continue;
      const dx=(t.x-pl.x)*pl._atkDir,dy=Math.abs(t.y-pl.y);
      if(dx>=-40&&dx<=120&&dy<40){t.hit=true;score+=getCS();incCombo();spawnParts(t.x,t.y,col,14);addPop('+'+getCS(),t.x,t.y);}
    }
    if(moved>=pl._atkDist){pl.vx=pl._atkDir*3;pl.vy*=0.3;pl._atkStartX=undefined;pl._atkStartY=undefined;}
    if(ch.id==='kousuke'&&Math.random()<0.6)effects.push({type:'spin_trail',x:pl.x,y:pl.y,fR:pl._atkDir>0,life:8,max:8,col:'#40e8e0',range:80});
  }
  const w=pl.wire;
  if(w&&w.phase==='flying'){
    w.prog=Math.min(1,w.prog+0.45);if(w.prog>=1)hookOn();
    pl.vy+=G*.4;pl.vx*=.99;pl.x+=pl.vx;pl.y+=pl.vy;
    syncTimer++;if(syncTimer%3===0)sendState();return;
  }
  if(w&&w.phase==='miss'){w.prog=Math.min(1,w.prog+0.22);if(w.prog>=1)pl.wire=null;pl.vy+=G;pl.vx*=FREE_D;pl.x+=pl.vx;pl.y+=pl.vy;return;}
  if(w&&w.phase==='hooked'){
    pl.vy+=G;const adx=w.ax-pl.x,ady=w.ay-pl.y,d=Math.sqrt(adx*adx+ady*ady)||1;
    const nx=adx/d,ny=ady/d;pl.vx+=nx*PULL;pl.vy+=ny*PULL;
    if(d>w.len){const vn=pl.vx*nx+pl.vy*ny;if(vn<0){pl.vx-=vn*nx;pl.vy-=vn*ny;}pl.x=w.ax-nx*w.len;pl.y=w.ay-ny*w.len;}
    clamp();pl.vx*=WIRE_D;pl.vy*=WIRE_D;pl.x+=pl.vx;pl.y+=pl.vy;
    syncTimer++;if(syncTimer%3===0)sendState();return;
  }
  pl.vy+=G;pl.vx*=FREE_D;pl.x+=pl.vx;pl.y+=pl.vy;
  syncTimer++;if(syncTimer%3===0)sendState();
}
let bullets=[],effects=[];
function tickEffects(){effects.forEach(e=>e.life--);effects=effects.filter(e=>e.life>0);}
let targets=[],score=0,combo=0,clearPend=false;
function getCS(){return 10*(combo+1);}function incCombo(){combo++;}
function spawnTargets(n=5){
  clearPend=false;targets=[];
  const vpf=platforms.filter(p=>!p.wall&&p.w>60);
  for(let i=0;i<n;i++){const pf=vpf[(Math.random()*vpf.length)|0];if(!pf)continue;targets.push({x:pf.x+15+Math.random()*(pf.w-30),y:pf.y-14,r:10,hit:false,pulse:Math.random()*Math.PI*2});}
  while(targets.length<n)targets.push({x:100+Math.random()*(WW-200),y:100+Math.random()*(WH*.5),r:10,hit:false,pulse:Math.random()*Math.PI*2});
}
function checkHit(){
  for(const t of targets){
    if(t.hit)continue;const dx=pl.x-t.x,dy=pl.y-t.y;
    if(dx*dx+dy*dy<(t.r+6)*(t.r+6)){t.hit=true;score+=getCS();incCombo();spawnParts(t.x,t.y,'#ffcc00',18);addPop('+'+getCS(),t.x,t.y);blip(550+combo*30,.12,.14);}
  }
  if(!clearPend&&targets.length>0&&targets.every(t=>t.hit)){clearPend=true;setTimeout(()=>spawnTargets(5+Math.min((score/400)|0,5)),700);}
}
let parts=[],pops=[];
function spawnParts(x,y,col,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*6;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:24,max:24,col,sz:2+Math.random()*3});}}
function tickParts(){parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;});parts=parts.filter(p=>p.life>0);}
function addPop(t,x,y){pops.push({t,x,y,life:60,max:60});}
function tickPops(){pops.forEach(p=>{p.y-=.5;p.life--;});pops=pops.filter(p=>p.life>0);}
let dFlash=0,dTimer=0;
function checkDead(){
  if(pl.dead)return;
  if(pl.y>WH+80||pl.x<-100||pl.x>WW+100){pl.dead=true;pl.deaths++;combo=0;dFlash=10;dTimer=90;spawnParts(Math.max(0,Math.min(WW,pl.x)),Math.min(WH,pl.y),'#e44',22);blip(90,.3,.2);sendState();}
}
function tickDead(){if(!pl.dead)return;dTimer--;if(dTimer<=0)resetPl();}
let actx;
function blip(f=440,d=.08,v=.1){
  try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();
    const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;
    g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
    o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d);}catch(e){}
}

// ══ DRAW ══
function drawBG(){
  const bgG=cx.createLinearGradient(0,0,0,WH);bgG.addColorStop(0,'#1e1828');bgG.addColorStop(.5,'#2a2235');bgG.addColorStop(1,'#352a40');
  cx.fillStyle=bgG;cx.fillRect(0,0,WW,WH);cx.fillStyle='rgba(60,50,75,.55)';
  [[WW*.02,WH*.62,WW*.12,WH*.38],[WW*.12,WH*.54,WW*.14,WH*.46],[WW*.24,WH*.58,WW*.13,WH*.42],
   [WW*.36,WH*.52,WW*.14,WH*.48],[WW*.48,WH*.56,WW*.12,WH*.44],[WW*.60,WH*.54,WW*.13,WH*.46],
   [WW*.72,WH*.58,WW*.12,WH*.42],[WW*.84,WH*.52,WW*.14,WH*.48],[WW*.92,WH*.60,WW*.10,WH*.40],
  ].forEach(([x,y,w,h])=>{cx.beginPath();cx.moveTo(x,WH);cx.lineTo(x+w*.4,y);cx.lineTo(x+w,WH);cx.fill();});
}
function drawBuildings(){
  for(const b of blds){
    const wallG=cx.createLinearGradient(b.x,0,b.x+b.w,0);
    wallG.addColorStop(0,'#2a2232');wallG.addColorStop(.08,'#3d3350');wallG.addColorStop(.92,'#3d3350');wallG.addColorStop(1,'#252030');
    cx.fillStyle=wallG;cx.fillRect(b.x,b.y,b.w,b.h);cx.fillStyle='rgba(18,14,26,.65)';
    const sw=14,gw=8,tot=sw+gw;for(let sx=b.x+6;sx<b.x+b.w-6;sx+=tot)cx.fillRect(sx,b.y+4,sw,b.h-4);
  }
  for(const pf of platforms){
    if(pf.wall)continue;cx.fillStyle='#b86818';cx.fillRect(pf.x,pf.y+4,pf.w,pf.h-4);
    cx.fillStyle='#e08828';cx.fillRect(pf.x,pf.y,pf.w,5);
    cx.beginPath();cx.arc(pf.x+3,pf.y+2.5,3,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(pf.x+pf.w-3,pf.y+2.5,3,0,Math.PI*2);cx.fill();
  }
}
function drawTargets(){
  for(const t of targets){
    if(t.hit)continue;t.pulse+=.07;const r=t.r+Math.sin(t.pulse)*1.2;
    cx.strokeStyle='rgba(255,200,0,.5)';cx.lineWidth=1.5;cx.beginPath();cx.arc(t.x,t.y,r+5,0,Math.PI*2);cx.stroke();
    cx.fillStyle='#ffcc00';cx.beginPath();cx.arc(t.x,t.y,r,0,Math.PI*2);cx.fill();
    cx.fillStyle='#ff8800';cx.beginPath();cx.arc(t.x,t.y,r*.35,0,Math.PI*2);cx.fill();
  }
}
function drawEffectsWorld(){
  for(const e of effects){
    const p=e.life/e.max,fdir=e.fR?1:-1;
    if(e.type==='spin'||e.type==='spin_trail'){
      const angle=(1-p)*Math.PI*4,r=e.range*p;cx.globalAlpha=p*.8;cx.strokeStyle=e.col;cx.lineWidth=4;cx.beginPath();
      for(let i=0;i<6;i++){const a=angle+i*Math.PI/3;cx.moveTo(e.x+Math.cos(a)*r*.3,e.y+Math.sin(a)*r*.3);cx.lineTo(e.x+Math.cos(a)*r,e.y+Math.sin(a)*r);}
      cx.stroke();cx.globalAlpha=p*.3;cx.strokeStyle=e.col;cx.lineWidth=2;cx.beginPath();cx.arc(e.x,e.y,r,0,Math.PI*2);cx.stroke();cx.globalAlpha=1;continue;
    }
    if(e.type==='slash_line'){
      cx.globalAlpha=p;cx.strokeStyle=e.col;cx.lineWidth=5;cx.beginPath();cx.moveTo(e.x,e.y);cx.lineTo(e.x+fdir*e.range,e.y);cx.stroke();
      cx.lineWidth=2;cx.globalAlpha=p*.45;cx.beginPath();cx.moveTo(e.x,e.y-10);cx.lineTo(e.x+fdir*e.range*.8,e.y-10);cx.stroke();
      cx.beginPath();cx.moveTo(e.x,e.y+10);cx.lineTo(e.x+fdir*e.range*.8,e.y+10);cx.stroke();
      cx.globalAlpha=p*.9;cx.fillStyle=e.col;cx.beginPath();cx.arc(e.x+fdir*e.range*.88,e.y,14*p,0,Math.PI*2);cx.fill();cx.globalAlpha=1;continue;
    }
    let hx,hy;
    if(e.type==='slash_diag_up'){hx=e.x+fdir*e.range*.72;hy=e.y-e.range*.72;}
    else if(e.type==='slash_h'){hx=e.x+fdir*e.range*.85;hy=e.y;}
    else{hx=e.x+fdir*e.range*.72;hy=e.y+e.range*.72;}
    const r=e.range*.38*(0.5+p*.5);
    cx.globalAlpha=p*.8;cx.strokeStyle=e.col;cx.lineWidth=6;cx.beginPath();cx.arc(hx,hy,r,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=p*.25;cx.fillStyle=e.col;cx.beginPath();cx.arc(hx,hy,r,0,Math.PI*2);cx.fill();
    cx.globalAlpha=p*.5;cx.strokeStyle=e.col;cx.lineWidth=3;cx.beginPath();cx.moveTo(e.x,e.y);cx.lineTo(hx,hy);cx.stroke();cx.globalAlpha=1;
  }
}
function drawPartsWorld(){for(const p of parts){cx.globalAlpha=p.life/p.max;cx.fillStyle=p.col;const s=p.sz*(p.life/p.max);cx.fillRect(p.x-s/2,p.y-s/2,s,s);}cx.globalAlpha=1;}
function drawCharacter(x,y,vx,wire,charIdx,isDead,dT){
  if(isDead&&dT>55)return;if(isDead&&Math.floor(dT/5)%2===0)return;
  const ch=CHARS[charIdx],img=IMGS[ch.spriteKey],fR=vx>=0;
  cx.save();cx.translate(x,y);cx.scale(fR?1:-1,1);
  if(img&&img.complete&&img.naturalWidth>0){const h=CHAR_H,w=img.naturalWidth/img.naturalHeight*h;cx.drawImage(img,-w/2,-h,w,h);}
  else{cx.fillStyle=ch.col;cx.beginPath();cx.arc(0,-CHAR_H*.75,CHAR_H*.2,0,Math.PI*2);cx.fill();cx.fillStyle='#111';cx.fillRect(-CHAR_H*.14,-CHAR_H*.6,CHAR_H*.28,CHAR_H*.5);}
  cx.restore();
  if(wire&&wire.phase!=='miss'){
    let tipX,tipY;const armX=x+(vx>=0?1:-1)*CHAR_H*.3,armY=y-CHAR_H*.45;
    if(wire.phase==='flying'){const ddx=wire.tX-x,ddy=wire.tY-y,dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;tipX=x+(ddx/dd)*Math.min(WIRE_MAX,dd)*wire.prog;tipY=y+(ddy/dd)*Math.min(WIRE_MAX,dd)*wire.prog;}
    else{tipX=wire.ax;tipY=wire.ay;}
    cx.save();cx.strokeStyle='rgba(160,140,100,.75)';cx.lineWidth=2.5;cx.setLineDash([6,5]);
    cx.beginPath();cx.moveTo(armX,armY);cx.lineTo(tipX,tipY);cx.stroke();cx.setLineDash([]);
    if(wire.phase==='hooked'){cx.fillStyle='#c8a060';cx.beginPath();cx.arc(tipX,tipY,5,0,Math.PI*2);cx.fill();}
    cx.restore();
  }
}
function drawPlayer(){drawCharacter(pl.x,pl.y,pl.vx,pl.wire,selChar,pl.dead,dTimer);}
function drawOpponent(){
  if(!isOnline)return;
  drawCharacter(op.x,op.y,op.vx,op.wire,op.charIdx,op.dead,0);
  cx.save();cx.fillStyle='rgba(255,100,100,0.85)';cx.font=`bold ${CHAR_H*0.18}px sans-serif`;cx.textAlign='center';
  cx.fillText('P2',op.x,op.y-CHAR_H-10);cx.restore();
}
function hexIcon(x,y,r,filled,col){
  cx.fillStyle=filled?col:'rgba(255,255,255,.12)';cx.beginPath();
  for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?cx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):cx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}
  cx.closePath();cx.fill();
  if(filled){cx.fillStyle='rgba(255,200,150,.35)';cx.beginPath();cx.arc(x-r*.2,y-r*.25,r*.38,0,Math.PI*2);cx.fill();}
}
function drawHUD(){
  const lives=Math.max(0,5-pl.deaths);for(let i=0;i<5;i++)hexIcon(10+i*20,16,8,i<lives,'#dd4422');
  const BW=SW*.2,BH=SH*.22,BY=SH-BH-8,ch=CHARS[selChar];
  cx.strokeStyle='rgba(255,255,255,.28)';cx.lineWidth=1.5;cx.strokeRect(8,BY,BW,BH);cx.fillStyle='rgba(0,0,0,.18)';cx.fillRect(8,BY,BW,BH);
  const reloadProg=ch._reloadTimer>0?1-ch._reloadTimer/30:1,ready=ch.ammo>0;
  if(!ready&&reloadProg<1){cx.fillStyle='rgba(0,0,0,.55)';cx.fillRect(8,BY,BW,BH);}
  if(reloadProg>0&&reloadProg<1){const fillH=BH*reloadProg;cx.fillStyle=`rgba(${parseInt(ch.col.slice(1,3),16)||200},${parseInt(ch.col.slice(3,5),16)||200},${parseInt(ch.col.slice(5,7),16)||200},.18)`;cx.fillRect(8,BY+BH-fillH,BW,fillH);}
  const wimg=IMGS[ch.weapKey];cx.globalAlpha=ready?1:0.35;
  if(wimg&&wimg.complete&&wimg.naturalWidth>0){const wh=BH*.55,ww=wimg.naturalWidth/wimg.naturalHeight*wh;cx.save();cx.translate(8+BW/2,BY+BH*.45);cx.rotate(-Math.PI/6);cx.drawImage(wimg,-ww/2,-wh/2,ww,wh);cx.restore();}
  cx.globalAlpha=1;
  const RX=SW-BW-8;cx.strokeStyle='rgba(255,255,255,.28)';cx.lineWidth=1.5;cx.strokeRect(RX,BY,BW,BH);cx.fillStyle='rgba(0,0,0,.18)';cx.fillRect(RX,BY,BW,BH);
  if(!ready&&reloadProg<1){cx.fillStyle='rgba(0,0,0,.55)';cx.fillRect(RX,BY,BW,BH);}
  if(reloadProg>0&&reloadProg<1){const fillH=BH*reloadProg;cx.fillStyle=`rgba(${parseInt(ch.col.slice(1,3),16)||200},${parseInt(ch.col.slice(3,5),16)||200},${parseInt(ch.col.slice(5,7),16)||200},.18)`;cx.fillRect(RX,BY+BH-fillH,BW,fillH);}
  cx.globalAlpha=ready?1:0.35;
  if(wimg&&wimg.complete&&wimg.naturalWidth>0){const wh=BH*.45,ww=wimg.naturalWidth/wimg.naturalHeight*wh;cx.save();cx.translate(RX+BW/2,BY+BH*.4);cx.rotate(-Math.PI/6);cx.drawImage(wimg,-ww/2,-wh/2,ww,wh);cx.restore();}
  cx.globalAlpha=1;
  cx.textAlign='center';
  for(const p of pops){cx.globalAlpha=p.life/p.max;cx.fillStyle='#ffd020';cx.font=`bold ${CHAR_H*0.12}px sans-serif`;cx.fillText(p.t,(p.x-camX)*VS,(p.y-camY)*VS);}
  cx.globalAlpha=1;
  if(dFlash>0){cx.fillStyle=`rgba(200,30,30,${dFlash*.09})`;cx.fillRect(0,0,SW,SH);dFlash--;}
  if(isOnline){cx.fillStyle='rgba(100,255,100,0.7)';cx.font='bold 12px sans-serif';cx.textAlign='right';cx.fillText('● ONLINE',SW-10,18);}
}

// ══ TITLE ══
let phase='title',titleAnim=0,wselAnim=0;
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}
function getTitleBtnAreas(){
  const bw=Math.min(SW*.35,160),bh=44,gap=16,totalW=bw*2+gap,bx=SW/2-totalW/2,by=SH*.62;
  return{solo:{x:bx,y:by,w:bw,h:bh},online:{x:bx+bw+gap,y:by,w:bw,h:bh}};
}
function drawTitle(){
  titleAnim+=.018;
  const bg=cx.createLinearGradient(0,0,0,SH);bg.addColorStop(0,'#c0b8a8');bg.addColorStop(.55,'#b0a898');bg.addColorStop(1,'#988f82');
  cx.fillStyle=bg;cx.fillRect(0,0,SW,SH);cx.fillStyle='rgba(148,140,128,.58)';
  const tw=SW/17;
  for(let i=0;i<18;i++){
    const tx=i*tw*1.08-tw*.1,ty=SH*(0.44+Math.sin(i*1.7)*.06),r=tw*(0.45+Math.sin(i*2.3)*.1);
    cx.beginPath();cx.arc(tx,ty,r,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(tx-r*.5,ty+r*.28,r*.7,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(tx+r*.44,ty+r*.22,r*.65,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(128,120,110,.36)';cx.fillRect(tx-2.5,ty+r*.55,5,SH-ty-r*.4);cx.fillStyle='rgba(148,140,128,.58)';
  }
  const fog=cx.createLinearGradient(0,SH*.48,0,SH);fog.addColorStop(0,'rgba(176,168,152,0)');fog.addColorStop(1,'rgba(176,168,152,.68)');
  cx.fillStyle=fog;cx.fillRect(0,SH*.48,SW,SH*.52);
  cx.textAlign='center';cx.font=`bold ${Math.min(SW*.09,54)}px "Courier New"`;
  cx.fillStyle='#7a0808';cx.fillText('Mekanin',SW/2+3,SH*.35+3);cx.fillStyle='#ffffff';cx.fillText('Mekanin',SW/2,SH*.35);
  const btns=getTitleBtnAreas();
  cx.fillStyle='rgba(255,255,255,0.15)';roundRect(cx,btns.solo.x,btns.solo.y,btns.solo.w,btns.solo.h,8);cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.4)';cx.lineWidth=1.5;roundRect(cx,btns.solo.x,btns.solo.y,btns.solo.w,btns.solo.h,8);cx.stroke();
  cx.fillStyle='#fff';cx.font=`bold ${Math.min(SW*.032,14)}px sans-serif`;cx.fillText('ひとりで遊ぶ',btns.solo.x+btns.solo.w/2,btns.solo.y+btns.solo.h/2+5);
  cx.fillStyle='rgba(160,96,255,0.25)';roundRect(cx,btns.online.x,btns.online.y,btns.online.w,btns.online.h,8);cx.fill();
  cx.strokeStyle='#a060ff';cx.lineWidth=1.5;roundRect(cx,btns.online.x,btns.online.y,btns.online.w,btns.online.h,8);cx.stroke();
  cx.fillStyle='#c890ff';cx.font=`bold ${Math.min(SW*.032,14)}px sans-serif`;cx.fillText('オンライン対戦',btns.online.x+btns.online.w/2,btns.online.y+btns.online.h/2+5);
}
function drawCharSel(){
  wselAnim+=.03;const bg=cx.createLinearGradient(0,0,0,SH);bg.addColorStop(0,'#0e0c18');bg.addColorStop(1,'#1c1828');
  cx.fillStyle=bg;cx.fillRect(0,0,SW,SH);cx.fillStyle='rgba(255,255,255,.07)';cx.fillRect(0,0,SW,32);
  cx.fillStyle='#c8b060';cx.font='bold 14px sans-serif';cx.textAlign='center';cx.fillText('SELECT CHARACTER',SW/2,20);
  const cols=3,cW=(SW-cols*16-16)/cols,cH=SH*.76;
  CHARS.forEach((ch,i)=>{
    const sel=i===selChar,x=8+i*(cW+16),y=36;
    const r=parseInt(ch.col.slice(1,3),16)||180,g=parseInt(ch.col.slice(3,5),16)||180,b=parseInt(ch.col.slice(5,7),16)||180;
    cx.fillStyle=sel?`rgba(${r},${g},${b},${0.55+Math.sin(wselAnim*4)*.18})`:'rgba(255,255,255,.08)';rr(cx,x,y,cW,cH,7);cx.fill();
    cx.strokeStyle=sel?ch.col:'rgba(255,255,255,.2)';cx.lineWidth=sel?1.5:.7;rr(cx,x,y,cW,cH,7);cx.stroke();
    const img=IMGS[ch.spriteKey];
    if(img&&img.complete&&img.naturalWidth>0){const ih=cH*.54,iw=img.naturalWidth/img.naturalHeight*ih;cx.drawImage(img,x+cW/2-iw/2,y+cH*.02,iw,ih);}
    cx.fillStyle=sel?'#fff':'rgba(255,255,255,.55)';cx.font=`bold ${Math.min(cW*.1,15)}px sans-serif`;cx.textAlign='center';cx.fillText(ch.name,x+cW/2,y+cH*.64);
    cx.fillStyle=sel?ch.col:'rgba(200,200,255,.4)';cx.font=`${Math.min(cW*.085,12)}px sans-serif`;cx.fillText('武器: '+ch.weapName,x+cW/2,y+cH*.73);
    const wimg=IMGS[ch.weapKey];
    if(wimg&&wimg.complete&&wimg.naturalWidth>0){const wh=cH*.14,ww=wimg.naturalWidth/wimg.naturalHeight*wh;cx.save();cx.translate(x+cW/2,y+cH*.86);cx.rotate(-Math.PI/6);cx.drawImage(wimg,-ww/2,-wh/2,ww,wh);cx.restore();}
    const descs=['斜め上移動攻撃','真横一閃攻撃','斜め下移動攻撃'];
    cx.fillStyle=sel?'rgba(255,255,255,.7)':'rgba(255,255,255,.25)';cx.font=`${Math.min(cW*.075,10)}px sans-serif`;cx.fillText(descs[i],x+cW/2,y+cH*.93);
    if(sel){cx.fillStyle=ch.col;cx.font='bold 11px sans-serif';cx.fillText('▼ SELECT',x+cW/2,y+cH*.99);}
  });
  cx.fillStyle='rgba(200,200,255,.5)';cx.font='12px sans-serif';cx.textAlign='center';cx.fillText('キャラをタップして選択  もう一度タップで決定',SW/2,SH-10);
}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}
function buildStage(){genBuildings();spawnTargets(5);resetPl();bullets=[];effects=[];parts=[];pops=[];}
function startPlay(){phase='play';score=0;combo=0;pl.deaths=0;buildStage();}
const lT=new Set(),rT=new Set();let mouseWiring=false;
function loop(){
  requestAnimationFrame(loop);
  if(phase==='title'){drawTitle();return;}if(phase==='charsel'){drawCharSel();return;}
  if(attackCD>0)attackCD--;
  updateCamera();
  CHARS.forEach(c=>{if(c._reloadTimer>0){c._reloadTimer--;if(c._reloadTimer===0)c.ammo=c.maxAmmo;}});
  tickPhys();checkDead();tickDead();
  if(!isOnline)checkHit();
  tickParts();tickPops();tickEffects();
  cx.fillStyle='#1a1520';cx.fillRect(0,0,SW,SH);
  cx.save();cx.scale(VS,VS);cx.translate(-camX,-camY);
  drawBG();drawBuildings();
  if(!isOnline)drawTargets();
  drawOpponent();drawPlayer();drawEffectsWorld();drawPartsWorld();
  cx.restore();drawHUD();
}
requestAnimationFrame(loop);

// ══ INPUT ══
function getBtnAreas(){const BW=SW*.2,BH=SH*.22,BY=SH-BH-8;return{left:{x:8,y:BY,w:BW,h:BH},right:{x:SW-BW-8,y:BY,w:BW,h:BH},wl:{x:SW-BW-8,y:BY+BH-22,w:BW/2,h:22},wr:{x:SW-BW/2-8,y:BY+BH-22,w:BW/2,h:22}};}
function inR(r,x,y){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;}
function changeChar(d){selChar=(selChar+d+CHARS.length)%CHARS.length;blip(440,.05,.07);}
const tmap={};
function getCardAreas(){const cols=3,cW=(SW-cols*16-16)/cols,cH=SH*.76;return CHARS.map((_,i)=>({x:8+i*(cW+16),y:36,w:cW,h:cH}));}
function handleTitleTap(x,y){
  const btns=getTitleBtnAreas();
  if(inR(btns.online,x,y)){onlineUI.classList.add('show');onlineStatus.textContent='接続中...';onlineContent.innerHTML='';connectWS();return;}
  phase='charsel';blip(500,.1,.1);
}
function handleCharSelTap(x,y){
  const cards=getCardAreas();
  for(let i=0;i<cards.length;i++){
    if(inR(cards[i],x,y)){
      if(selChar===i){if(isOnline){buildStage();phase='play';}else{startPlay();}blip(600,.1,.12);}
      else{selChar=i;blip(440,.05,.07);}return;
    }
  }
  if(isOnline){buildStage();phase='play';}else{startPlay();}
}
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const x=t.clientX,y=t.clientY;
    if(phase==='title'){handleTitleTap(x,y);return;}
    if(phase==='charsel'){handleCharSelTap(x,y);return;}
    const ar=getBtnAreas();
    if(inR(ar.wl,x,y)){changeChar(-1);tmap[t.identifier]='wl';continue;}
    if(inR(ar.wr,x,y)){changeChar(1);tmap[t.identifier]='wr';continue;}
    if(inR(ar.left,x,y)){doAttack(-1);tmap[t.identifier]='atk';}
    else if(inR(ar.right,x,y)){doAttack(1);tmap[t.identifier]='atk';}
    else{const w=toWorld(x,y);grapple(w.x,w.y);tmap[t.identifier]='wire';}
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){const k=tmap[t.identifier];lT.delete(t.identifier);rT.delete(t.identifier);if(k==='wire')relWire();delete tmap[t.identifier];}
},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
cv.addEventListener('mousedown',e=>{
  const x=e.clientX,y=e.clientY;
  if(phase==='title'){handleTitleTap(x,y);return;}if(phase==='charsel'){handleCharSelTap(x,y);return;}
  const ar=getBtnAreas();
  if(inR(ar.wl,x,y)){changeChar(-1);return;}if(inR(ar.wr,x,y)){changeChar(1);return;}
  if(inR(ar.left,x,y)){doAttack(-1);}else if(inR(ar.right,x,y)){doAttack(1);}
  else{const w=toWorld(x,y);grapple(w.x,w.y);mouseWiring=true;}
});
cv.addEventListener('mouseup',()=>{lT.delete('mouse');rT.delete('mouse');if(mouseWiring){relWire();mouseWiring=false;}});
window.addEventListener('keydown',e=>{
  if(phase==='title'){phase='charsel';return;}
  if(phase==='charsel'){if(e.key==='ArrowLeft')changeChar(-1);if(e.key==='ArrowRight')changeChar(1);if(e.key===' '||e.key==='Enter')startPlay();return;}
  const dir=pl.vx>=0?1:-1;
  if(e.key==='ArrowLeft'||e.key==='a'){pl.vx-=8;clamp();}if(e.key==='ArrowRight'||e.key==='d'){pl.vx+=8;clamp();}
  if(e.key==='ArrowUp'){relWire();pl.vy=-10;clamp();}
  if(e.key==='q')changeChar(-1);if(e.key==='e')changeChar(1);
  if(e.key===' '||e.key==='z')doAttack(dir);if(e.key==='x')relWire();
});
</script>
